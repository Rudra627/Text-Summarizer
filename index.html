<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
        }

        .header {
            padding: 16px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user .message-content {
            background: #2f2f2f;
            color: #fff;
        }

        .message.assistant .message-content {
            background: #1f1f1f;
            color: #fff;
            border: 1px solid #333;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                background: #666;
                transform: translateY(0);
            }
            30% {
                background: #888;
                transform: translateY(-10px);
            }
        }

        .input-container {
            padding: 16px 24px;
            border-top: 1px solid #333;
            background: #000;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: #1f1f1f;
            border: 1px solid #333;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            min-height: 44px;
        }

        textarea:focus {
            outline: none;
            border-color: #444;
            background: #262626;
        }

        textarea::placeholder {
            color: #666;
        }

        button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            min-width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: #0d8f6f;
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h1>Text Summarizer</h1>
        </div>

        <div class="messages-container" id="messages-container">
            <div class="message assistant">
                <div class="message-content">Hi! I'm your text summarizer. Paste any text you'd like me to summarize, and I'll generate a concise summary for you.</div>
            </div>
        </div>

        <div class="input-container">
            <form id="chat-form">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Paste your text here..." required></textarea>
                    <button type="submit" id="send-button">Send</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById("messages-container");
        const chatForm = document.getElementById("chat-form");
        const messageInput = document.getElementById("message-input");
        const sendButton = document.getElementById("send-button");

        function autoResizeTextarea() {
            messageInput.style.height = "auto";
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + "px";
        }

        messageInput.addEventListener("input", autoResizeTextarea);

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function createMessageElement(content, type) {
            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${type}`;
            
            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            return messageDiv;
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement("div");
            messageDiv.className = "message assistant";
            messageDiv.id = "typing-indicator";
            
            const typingDiv = document.createElement("div");
            typingDiv.className = "typing-indicator";
            typingDiv.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            
            messageDiv.appendChild(typingDiv);
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById("typing-indicator");
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const text = messageInput.value.trim();
            if (!text) return;

            // Add user message
            messagesContainer.appendChild(createMessageElement(text, "user"));
            messageInput.value = "";
            messageInput.style.height = "auto";
            scrollToBottom();

            // Show typing indicator
            showTypingIndicator();
            sendButton.disabled = true;

            try {
                console.log("Sending text to summarizer...");
                const response = await fetch("/summarize/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dialogue: text }),
                });

                console.log("Response status:", response.status);

                if (!response.ok) {
                    throw new Error(`Server Error ${response.status}`);
                }

                const data = await response.json();
                console.log("Response data:", data);

                removeTypingIndicator();

                if (data.summary) {
                    messagesContainer.appendChild(createMessageElement(data.summary, "assistant"));
                } else {
                    messagesContainer.appendChild(createMessageElement("Unable to generate summary. Please try again.", "assistant"));
                }
            } catch (err) {
                console.error("Error:", err);
                removeTypingIndicator();
                messagesContainer.appendChild(createMessageElement(`Error: ${err.message}`, "assistant"));
            } finally {
                sendButton.disabled = false;
                scrollToBottom();
            }
        });
    </script>
</body>
</html>
